name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test gate
        run: swift test

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERT }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [[ -z "$CERT_BASE64" ]]; then
            echo "::error::MACOS_CERT secret is required for signed releases"
            exit 1
          fi
          echo "$CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -project mac2imgur.xcodeproj \
            -scheme mac2imgur \
            -configuration Release \
            -archivePath build/mac2imgur.xcarchive \
            -destination 'platform=macOS' \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual

      - name: Export
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build/export
          cat > build/exportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/mac2imgur.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/exportOptions.plist

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/export
          ditto -c -k --keepParent mac2imgur.app mac2imgur-unstapled.zip
          xcrun notarytool submit mac2imgur-unstapled.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple mac2imgur.app
          rm mac2imgur-unstapled.zip
          ditto -c -k --keepParent mac2imgur.app mac2imgur.zip

      - name: Sign Sparkle update
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        id: sparkle
        run: |
          # Find sign_update binary from SPM-resolved Sparkle package
          SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -type f | head -1)
          if [[ -z "$SIGN_UPDATE" ]]; then
            # Fallback: download Sparkle directly
            curl -sL https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.6.4.tar.xz -o /tmp/sparkle.tar.xz
            tar -xf /tmp/sparkle.tar.xz -C /tmp
            SIGN_UPDATE=/tmp/bin/sign_update
          fi
          # sign_update writes private key to a temp file, signs, prints sparkle:edSignature="..." sparkle:length="..."
          PRIV_FILE=$(mktemp)
          echo "$SPARKLE_PRIVATE_KEY" > "$PRIV_FILE"
          SIG_OUTPUT=$("$SIGN_UPDATE" -f "$PRIV_FILE" build/export/mac2imgur.zip)
          rm "$PRIV_FILE"
          echo "Sparkle signature: $SIG_OUTPUT"
          echo "sig_output=$SIG_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            build/export/mac2imgur.zip \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}. See [CHANGELOG](https://github.com/CraigVG/mac2imgur/commits/master) for details."

      - name: Update appcast.xml
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SPARKLE_SIG_OUTPUT: ${{ steps.sparkle.outputs.sig_output }}
        run: |
          ZIP_URL="https://github.com/CraigVG/mac2imgur/releases/download/${GITHUB_REF_NAME}/mac2imgur.zip"
          ZIP_PATH="build/export/mac2imgur.zip"
          ./scripts/update_appcast.sh "$GITHUB_REF_NAME" "$ZIP_URL" "$ZIP_PATH" "$SPARKLE_SIG_OUTPUT"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add appcast.xml
          git commit -m "[ci] Update appcast for ${GITHUB_REF_NAME}"
          git push origin HEAD:master
